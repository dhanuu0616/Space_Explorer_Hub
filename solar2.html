<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Solar System</title>

<style>

body{
    margin:0;
    color:white;
    font-family:Arial;
    text-align:center;
    overflow-x:hidden;
}

/* VIDEO BACKGROUND */
video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-1;
}

/* HEADER */
header{
    background:#020024;
    padding:30px;
    color:#00eaff;
}

/* CONTENT */
.content{
    padding:40px;
    font-size:18px;
    line-height:1.6;
}

/* IMAGE */
img{
    width:400px;
    border-radius:15px;
    box-shadow:0 0 20px #00eaff;
    transition:0.4s;
    cursor:pointer;
}
img:hover{
    transform:scale(1.05);
    box-shadow:0 0 35px #00eaff;
}

/* LINKS */
a{
    color:#00eaff;
    text-decoration:none;
    font-size:18px;
}

</style>
</head>

<body>

<!-- BACKGROUND VIDEO -->
<video autoplay muted loop>
    <source src="bg.mp4" type="video/mp4">
</video>

<header>
<h1>🌞 Solar System</h1>
</header>

<div class="content">
<p>
The Solar System consists of the Sun and all the objects that orbit it. This includes 8 planets, moons, asteroids and comets.
</p>

<p>
The Sun is at the center and provides light and energy to all planets. Gravity keeps all planets in orbit around the Sun.
</p>

<a href="solar.mp4">
<img src="https://upload.wikimedia.org/wikipedia/commons/c/c3/Solar_sys8.jpg">
</a>

</div>

</p>

</body>
</html>
