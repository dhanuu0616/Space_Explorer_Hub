<!DOCTYPE html>
<html>
<head>
<title>Contact</title>

<style>
body{
    font-family:Arial;
    background:#0b0c2a;
    color:white;
    text-align:center;
}

/* Box */
.contact{
    margin:60px auto;
    padding:20px;
    width:280px;
    background:rgba(255,255,255,0.1);
    border-radius:10px;
}

/* Inputs */
input, textarea{
    width:90%;
    padding:8px;
    margin:8px 0;
    border:none;
    border-radius:5px;
}

/* Button */
button{
    padding:8px 15px;
    background:#00eaff;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:#00bcd4;
}
</style>

</head>

<body>

<div class="contact">
    <h2>Contact Us 📩</h2>

    <input type="text" placeholder="Your Name"><br>
    <input type="email" placeholder="Your Email"><br>
    <textarea rows="4" placeholder="Your Message"></textarea><br>

    <button>Send</button>

    <p style="font-size:12px; margin-top:10px;">
        Email: yourname@gmail.com
    </p>
</div>
<p>
<a href="index.html">⬅ Back to Home</a>
</p>


</body>
</html>
